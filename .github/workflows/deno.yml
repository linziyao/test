# This workflow will install Deno then run `deno lint` and `deno test`.
# For more information see: https://github.com/denoland/setup-deno

name: Deno

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        # 已升级：使用最新的 v2 版本，解决底层 Node 运行环境过时的警告
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      # Uncomment this step to verify the use of 'deno fmt' on each commit.
      # - name: Verify formatting
      #   run: deno fmt --check

      # Linter step disabled to allow development to continue
      # - name: Run linter
      #   run: deno lint

      # - name: Run tests
      #   run: deno test -A